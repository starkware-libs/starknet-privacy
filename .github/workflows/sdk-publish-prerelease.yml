name: SDK Publish Prerelease

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish branch prerelease to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://npm.pkg.github.com
          scope: '@starkware-libs'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Compute prerelease version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          BRANCH=$(printf '%s' "$REF_NAME" | tr '/_' '-' | tr -cd 'a-zA-Z0-9-')
          SHORT_SHA=${SHA::7}
          BASE=$(node -p "require('./package.json').version")
          # Strip any existing prerelease suffix from BASE so reruns stay clean.
          BASE_CLEAN=${BASE%%-*}
          NEW_VERSION="${BASE_CLEAN}-${BRANCH}.${SHORT_SHA}"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=branch-${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIST_TAG: ${{ steps.version.outputs.tag }}
        run: npm publish --tag "$DIST_TAG"

      - name: Summary
        env:
          PUBLISHED_VERSION: ${{ steps.version.outputs.version }}
          DIST_TAG: ${{ steps.version.outputs.tag }}
        run: |
          {
            echo "Published \`@starkware-libs/starknet-privacy-sdk@${PUBLISHED_VERSION}\`"
            echo
            echo "Install with:"
            echo '```'
            echo "npm install @starkware-libs/starknet-privacy-sdk@${PUBLISHED_VERSION}"
            echo "# or, latest from this branch:"
            echo "npm install @starkware-libs/starknet-privacy-sdk@${DIST_TAG}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
