name: Proxy CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  elliptic-proxy:
    name: elliptic-proxy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elliptic-proxy
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - 'elliptic-proxy/**'
      - uses: actions/setup-node@v4
        if: steps.filter.outputs.changed == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: elliptic-proxy/package-lock.json
      - if: steps.filter.outputs.changed == 'true'
        run: npm ci
      - if: steps.filter.outputs.changed == 'true'
        run: npm run lint
      - if: steps.filter.outputs.changed == 'true'
        run: npm test
