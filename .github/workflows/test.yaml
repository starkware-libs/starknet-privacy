name: Test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.17.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Regenerate screening fixtures + Cairo vectors, fail on drift
        run: |
          (cd scripts/address_validation_signer/ts && npm install)
          scripts/gen_screening_fixtures.py
          scripts/gen_cairo_screening_vectors.py
          scarb fmt -p privacy
          git diff --exit-code fixtures/screening-vectors.json \
                               packages/privacy/src/tests/screening_vectors.cairo

      - uses: software-mansion/setup-universal-sierra-compiler@v1
        with:
          universal-sierra-compiler-version: "v2.8.0"

      - name: Install starknet-foundry via asdf
        uses: asdf-vm/actions/install@v3
        with:
          asdf_branch: v0.14.1
          tool_versions: |
            starknet-foundry 0.59.0

      - name: Run tests
        run: scarb test -w
        # TODO: remove SCARB_IGNORE_CAIRO_VERSION once openzeppelin upgrades to Cairo >=2.17
        env:
          SCARB_IGNORE_CAIRO_VERSION: "true"
