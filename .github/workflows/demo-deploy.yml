name: Demo Deploy

on:
  pull_request:
    paths:
      - 'demo/**'
      - '.github/workflows/demo-deploy.yml'

jobs:
  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Build SDK
        working-directory: sdk
        run: npm ci && npm run build

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci

      - name: Pull Vercel env and build
        working-directory: demo
        # Pull preview env but rename the file to .env.production.local so
        # `vercel build --prod` classifies the artifact as production-target
        # (required for manual "Promote to Production") while still baking in
        # preview env values.
        run: |
          npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          mv .vercel/.env.preview.local .vercel/.env.production.local

          # Generate vercel.json with:
          # - rewrites: proxy HTTP backends through the Vercel deployment,
          #   avoiding mixed HTTP/HTTPS content errors.
          # - headers: CSP blocks cross-origin script injection; Referrer-Policy
          #   prevents URL-param leaks (e.g. a ?view= link) from reaching
          #   upstream services via the Referer header; X-Frame-Options blocks
          #   clickjacking; Permissions-Policy denies unused device APIs.
          eval "$(grep '^BACKEND_' ".vercel/.env.production.local")"
          CSP="default-src 'self'; script-src 'self'; connect-src 'self' https: wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'none'; object-src 'none'"
          printf '{"installCommand":"echo skipped","outputDirectory":"dist","rewrites":[{"source":"/api/rpc/:path*","destination":"%s/rpc/:path*"},{"source":"/api/indexer/:path*","destination":"%s/:path*"},{"source":"/api/prover/:path*","destination":"%s/:path*"},{"source":"/api/gateway/:path*","destination":"%s/:path*"}],"headers":[{"source":"/(.*)","headers":[{"key":"Content-Security-Policy","value":"%s"},{"key":"Referrer-Policy","value":"no-referrer"},{"key":"X-Frame-Options","value":"DENY"},{"key":"X-Content-Type-Options","value":"nosniff"},{"key":"Permissions-Policy","value":"camera=(), microphone=(), geolocation=()"}]}]}\n' \
            "$BACKEND_RPC_URL" "$BACKEND_INDEXER_URL" "$BACKEND_PROVER_URL" "$BACKEND_GATEWAY_URL" "$CSP" > vercel.json

          npx vercel build --prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (preview)
        uses: amondnet/vercel-action@16e87c0a08142b0d0d33b76aeaf20823c381b9b9 # v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-version: latest
          # Personal-scope token needs --scope for inspect after a team deploy,
          # otherwise vercel inspect falls back to the token's default scope.
          scope: keep-starknet-strange
          working-directory: demo
          # --prod matches the production target of the `vercel build --prod`
          # artifact; --skip-domain prevents auto-aliasing to the production
          # domain, so the deployment lands at a preview URL and can be
          # promoted manually from the Vercel UI.
          vercel-args: '--prebuilt --prod --skip-domain'
          github-comment: true
