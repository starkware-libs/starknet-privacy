name: Discovery Service

on:
  pull_request:
    paths:
      - 'crates/discovery-service/**'
      - '.github/workflows/discovery-service.yml'

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build -p discovery-service

      - name: Run unit tests
        run: cargo test -p discovery-service --lib

      - name: Install asdf
        uses: asdf-vm/actions/setup@v3

      - name: Install starknet-devnet via asdf
        run: |
          asdf plugin add starknet-devnet
          asdf install starknet-devnet

      - name: Run integration tests
        run: cargo test -p discovery-service --test integration -- --test-threads=1
