name: Proof Interceptor Docker

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    tags: ['*']
    paths:
      - 'proof-interceptor/**'
      - 'sdk/**'
      - 'deploy/proof-interceptor/**'
      - '.github/workflows/proof-interceptor-docker.yaml'
  pull_request:
    paths:
      - 'proof-interceptor/**'
      - 'sdk/**'
      - 'deploy/proof-interceptor/**'
      - '.github/workflows/proof-interceptor-docker.yaml'

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/proof-interceptor
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: deploy/proof-interceptor/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=ghcr.io/${{ github.repository }}/proof-interceptor",push-by-digest=true,name-canonical=true,push=true
      - run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/proof-interceptor
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - run: |
          cd /tmp/digests
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}')
          sources=$(printf 'ghcr.io/${{ github.repository }}/proof-interceptor@sha256:%s ' *)
          docker buildx imagetools create $tags $sources
        shell: bash
