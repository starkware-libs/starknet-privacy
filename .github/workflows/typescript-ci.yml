name: TypeScript CI

on:
  pull_request:
    paths:
      - 'sdk/**'
      - 'packages/**'
      - '.github/workflows/typescript-ci.yml'

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.0"

      - name: Install snforge
        uses: foundry-rs/setup-snfoundry@v3

      - name: Apply Cairo patch
        working-directory: .
        run: |
          if [ -f "sdk/cairo.patch" ]; then
            echo "Applying sdk/cairo.patch"
            git apply sdk/cairo.patch
          fi

      - name: Build Cairo contracts
        working-directory: .
        run: scarb build

      - name: Install dependencies
        run: npm ci

      - name: Build, lint, and test
        run: |
          if npm run ci --if-present 2>/dev/null; then
            echo "Ran npm run ci"
          else
            npm run check
          fi
