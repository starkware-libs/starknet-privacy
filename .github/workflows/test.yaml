name: Test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/setup-snfoundry@v3
        with:
          starknet-foundry-version: "0.54.1"
      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.0"

      - name: Run tests
        run: scarb test -w
