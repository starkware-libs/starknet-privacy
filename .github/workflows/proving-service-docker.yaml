name: Proving Service Docker

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/proving-service-docker.yaml'
      - 'deploy/proving-service/**'
  pull_request:
    paths:
      - '.github/workflows/proving-service-docker.yaml'
      - 'deploy/proving-service/**'

jobs:
  build-starknet-os-runner:
    name: starknet_os_runner (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve commits
        id: commits
        run: |
          source deploy/proving-service/revisions.env
          echo "sequencer_commit=$SEQUENCER_COMMIT" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/proving-service/Dockerfile.sequencer
          platforms: ${{ matrix.platform }}
          target: output
          build-args: |
            SEQUENCER_COMMIT=${{ steps.commits.outputs.sequencer_commit }}
          cache-from: type=gha,scope=sequencer-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=sequencer-${{ matrix.arch }}
          outputs: type=local,dest=/tmp/binaries

      - uses: actions/upload-artifact@v4
        with:
          name: starknet-os-runner-binaries-${{ matrix.arch }}
          path: /tmp/binaries/*
          if-no-files-found: error
          retention-days: 1

  build-stwo-run-and-prove:
    name: stwo_run_and_prove (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve commits
        id: commits
        run: |
          source deploy/proving-service/revisions.env
          echo "proving_utils_commit=$PROVING_UTILS_COMMIT" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/proving-service/Dockerfile.proving-utils
          platforms: ${{ matrix.platform }}
          target: output
          build-args: |
            PROVING_UTILS_COMMIT=${{ steps.commits.outputs.proving_utils_commit }}
          cache-from: type=gha,scope=proving-utils-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=proving-utils-${{ matrix.arch }}
          outputs: type=local,dest=/tmp/binaries

      - uses: actions/upload-artifact@v4
        with:
          name: stwo-run-and-prove-binaries-${{ matrix.arch }}
          path: /tmp/binaries/*
          if-no-files-found: error
          retention-days: 1

  assemble:
    name: Assemble (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [build-starknet-os-runner, build-stwo-run-and-prove]
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: starknet-os-runner-binaries-${{ matrix.arch }}
          path: /tmp/runtime-context

      - uses: actions/download-artifact@v4
        with:
          name: stwo-run-and-prove-binaries-${{ matrix.arch }}
          path: /tmp/runtime-context

      - uses: docker/build-push-action@v5
        id: build
        with:
          context: /tmp/runtime-context
          file: deploy/proving-service/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          outputs: type=image,"name=ghcr.io/${{ github.repository }}/proving-service",push-by-digest=true,name-canonical=true,push=true

      - run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - uses: actions/checkout@v4

      - name: Resolve commits
        id: commits
        run: |
          source deploy/proving-service/revisions.env
          echo "sequencer_commit=$SEQUENCER_COMMIT" >> "$GITHUB_OUTPUT"
          echo "proving_utils_commit=$PROVING_UTILS_COMMIT" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create multi-arch manifest
        run: |
          image="ghcr.io/${{ github.repository }}/proving-service"
          sources=$(cd /tmp/digests && printf "${image}@sha256:%s " *)
          tag="rev-${SEQUENCER_COMMIT::7}-${PROVING_UTILS_COMMIT::7}"
          docker buildx imagetools create -t "${image}:${tag}" $sources
        env:
          SEQUENCER_COMMIT: ${{ steps.commits.outputs.sequencer_commit }}
          PROVING_UTILS_COMMIT: ${{ steps.commits.outputs.proving_utils_commit }}
        shell: bash
