[workspace]
members = [
    "packages/privacy",
]


[workspace.package]
version = "0.1.0"
edition = "2024_07"
license-file = "LICENSE"

[workspace.dependencies]
starknet = "2.15.1"
snforge_std = { version = "0.55.0+nightly-2026-02-20", registry = "https://scarbs.dev/" }
assert_macros = "2.15.1"
openzeppelin = "3.0.0"
starkware_utils = { git ="https://github.com/starkware-libs/starkware-starknet-utils", rev="54577c02cad807c7515201a71392e08714087d96" }
starkware_utils_testing = { git="https://github.com/starkware-libs/starkware-starknet-utils", rev="54577c02cad807c7515201a71392e08714087d96" }

[workspace.tool.fmt]
sort-module-level-items = true

[workspace.tool.scarb]
allow-prebuilt-plugins = ["snforge_std"]

[scripts]
test = "SNFORGE_BACKTRACE=1 snforge test"

[[target.starknet-contract]]
casm = true

[[test]]
name = "unittest"


[profile.dev.cairo]
unstable-add-statements-code-locations-debug-info = true
unstable-add-statements-functions-debug-info = true
inlining-strategy = "avoid"
