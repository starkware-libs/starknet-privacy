name: Main Branch Integration

on:
  push:
    branches:
      - main

jobs:
  test:
    uses: ./.github/workflows/test.yaml

  notify-slack:
    needs: test
    if: failure()
    uses: ./.github/workflows/notify-slack.yaml
    with:
      context_title: "main branch"
      failed_job_name: "test"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
