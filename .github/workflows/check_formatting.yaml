name: Check Formatting

on:
  workflow_call:

jobs:
  check_formatting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: software-mansion/setup-scarb@2a96b748888e3329ee44ac9ac073d930e692b3cd # v1
        with:
          scarb-version: "2.17.0"

      - uses: software-mansion/setup-universal-sierra-compiler@30c139bca57cc0561cfae6f5353825bbc42c9f37 # v1
        with:
          universal-sierra-compiler-version: "v2.8.0"

      - name: Check formatting
        run: |
          scarb fmt -w --check

      - name: Check unused imports and variables
        run: |
          scarb cache clean
          echo "::group::scarb build output"
          output=$(scarb build -t 2>&1) || {
            echo "$output"
            echo "::endgroup::"
            echo "::error::scarb build failed"
            exit 1
          }
          echo "$output"
          echo "::endgroup::"
          matches=$(echo "$output" | grep -E "warn: Unused import|warn\[E0001\]: Unused variable" -A 2 || true)
          if [ -n "$matches" ]; then
            echo "::error::Unused imports or variables detected"
            echo "$matches"
            exit 1
          fi
