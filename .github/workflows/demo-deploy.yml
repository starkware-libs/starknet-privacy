name: Demo Deploy

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'demo/**'
      - '.github/workflows/demo-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'demo/**'
      - '.github/workflows/demo-deploy.yml'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Vercel project link
        run: |
          mkdir -p demo/.vercel
          echo '{"orgId":"${{ secrets.VERCEL_ORG_ID }}","projectId":"${{ secrets.VERCEL_PROJECT_ID }}"}' > demo/.vercel/project.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            sdk/package-lock.json
            demo/package-lock.json

      - name: Build SDK
        working-directory: sdk
        run: npm ci && npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Verify Vercel project link
        working-directory: demo
        run: |
          echo "project.json contents:"
          cat .vercel/project.json
          echo ""
          vercel whoami --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull env vars from Vercel
        working-directory: demo
        run: vercel env pull .env --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci

      - name: Build demo
        working-directory: demo
        run: npm run build

      - name: Deploy to Vercel (staging)
        if: github.ref == 'refs/heads/main'
        working-directory: demo
        run: |
          vercel deploy dist/ --prod --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
          echo "url=$(cat deployment-url.txt)" >> "$GITHUB_OUTPUT"
        id: deploy

      - name: Deploy to Vercel (preview)
        if: github.ref != 'refs/heads/main'
        working-directory: demo
        run: |
          vercel deploy dist/ --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
          echo "url=$(cat deployment-url.txt)" >> "$GITHUB_OUTPUT"
        id: deploy-preview

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const url = fs.readFileSync('demo/deployment-url.txt', 'utf8').trim();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Demo preview deployed:** ${url}`
            });
