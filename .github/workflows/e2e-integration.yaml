name: E2E Integration Tests

on:
  workflow_dispatch:

jobs:
  integration:
    name: E2E Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            sdk/package-lock.json
            e2e/package-lock.json

      # Scarb (for Cairo contract build)
      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.17.0-rc.4"

      - uses: software-mansion/setup-universal-sierra-compiler@v1
        with:
          universal-sierra-compiler-version: "v2.8.0-rc.0"

      # Build Cairo contracts (release for class hash + artifacts)
      - name: Build contracts
        # TODO: remove SCARB_IGNORE_CAIRO_VERSION once openzeppelin upgrades to Cairo >=2.17
        run: scarb --profile release build -p privacy
        env:
          SCARB_IGNORE_CAIRO_VERSION: "true"

      # Build SDK (e2e depends on it via file: link)
      - name: Build SDK
        run: cd sdk && npm ci && npm run build

      # Install e2e deps
      - name: Install e2e dependencies
        run: cd e2e && npm ci

      # Pull env from Vercel (run from demo/ where .vercel/project.json lives)
      - name: Pull environment from Vercel
        working-directory: demo
        run: npx tsx ../e2e/scripts/pull-env.ts
        env:
          OUT_FILE: ../e2e/.env
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Run integration tests
      - name: Run integration tests
        working-directory: e2e
        run: npm run test:integration
        timeout-minutes: 10
