name: E2E Integration Tests

on:
  workflow_dispatch:

jobs:
  integration:
    name: E2E Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      # Node
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            sdk/package-lock.json
            e2e/package-lock.json

      # Scarb (for Cairo contract build)
      - uses: software-mansion/setup-scarb@2a96b748888e3329ee44ac9ac073d930e692b3cd # v1
        with:
          scarb-version: "2.17.0"

      - uses: software-mansion/setup-universal-sierra-compiler@30c139bca57cc0561cfae6f5353825bbc42c9f37 # v1
        with:
          universal-sierra-compiler-version: "v2.8.0"

      # Build Cairo contracts (release for class hash + artifacts)
      - name: Build contracts
        run: scarb --profile release build -p privacy

      # Build SDK (e2e depends on it via file: link)
      - name: Build SDK
        run: cd sdk && npm ci && npm run build

      # Install e2e deps
      - name: Install e2e dependencies
        run: cd e2e && npm ci

      # Pull env from Vercel (run from demo/ where .vercel/project.json lives)
      - name: Pull environment from Vercel
        working-directory: demo
        run: npx tsx ../e2e/scripts/pull-env.ts
        env:
          OUT_FILE: ../e2e/.env
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Run integration tests
      - name: Run integration tests
        working-directory: e2e
        run: npm run test:integration
        timeout-minutes: 10
