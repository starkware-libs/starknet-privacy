name: Rust CI

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'packages/**'
      - '.github/workflows/rust-ci.yaml'
  push:
    branches:
      - main

jobs:
  rust_ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.0"

      - name: Install snforge
        uses: foundry-rs/setup-snfoundry@v3

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust build
        run: cargo build --workspace --all-targets

      - name: Generate Cairo reference data
        run: |
          cd sdk
          npm run generate:cairo-refs
          cp tests/fixtures/cairo-reference-data.json ../crates/discovery-core/tests/fixtures/cairo-reference-data.json

      - name: Rust test
        run: cargo test --workspace --all-targets
