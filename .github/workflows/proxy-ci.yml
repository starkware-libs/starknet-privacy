name: Proxy CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  elliptic-proxy:
    name: elliptic-proxy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elliptic-proxy
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            changed:
              - 'elliptic-proxy/**'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.filter.outputs.changed == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: elliptic-proxy/package-lock.json
      - if: steps.filter.outputs.changed == 'true'
        run: npm ci
      - if: steps.filter.outputs.changed == 'true'
        run: npm run lint
      - if: steps.filter.outputs.changed == 'true'
        run: npm test

  proof-interceptor:
    name: proof-interceptor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            changed:
              - 'proof-interceptor/**'
              - 'elliptic-proxy/**'
              - 'sdk/src/internal/abi.ts'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.filter.outputs.changed == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: proof-interceptor/package-lock.json
      - name: Build SDK (proof-interceptor depends on ABI)
        if: steps.filter.outputs.changed == 'true'
        working-directory: sdk
        run: npm ci && npm run build
      - name: Install
        if: steps.filter.outputs.changed == 'true'
        working-directory: proof-interceptor
        run: npm ci
      - name: Lint
        if: steps.filter.outputs.changed == 'true'
        working-directory: proof-interceptor
        run: npm run lint
      - name: Test
        if: steps.filter.outputs.changed == 'true'
        working-directory: proof-interceptor
        run: npm test
