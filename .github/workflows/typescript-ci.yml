name: TypeScript CI

on:
  pull_request:
    paths:
      - 'sdk/**'
      - 'packages/**'
      - '.github/workflows/typescript-ci.yml'
  push:
    branches:
      - main

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.1"

      - name: Install starknet-foundry via asdf
        uses: asdf-vm/actions/install@v3
        with:
          tool_versions: |
            starknet-foundry nightly-2026-02-03

      - name: Regenerate Cairo contract artifacts
        run: npm run generate

      - name: Run tests
        run: npm run test:fast

  devnet:
    name: Devnet Test
    runs-on: ubuntu-latest
    # FIXME: set continue-on-error to false once starknet-devnet supports get_execution_info_v3_syscall
    continue-on-error: true
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.1"

      - name: Install starknet-devnet via asdf
        uses: asdf-vm/actions/install@v3
        with:
          tool_versions: |
            starknet-devnet 0.7.2

      - name: Install npm dependencies
        run: npm ci

      - name: Build Cairo contracts
        run: npm run scarb:build

      - name: Run devnet tests
        run: npm run test:devnet
