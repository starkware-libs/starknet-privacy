name: Demo Deploy

on:
  pull_request:
    paths:
      - 'demo/**'
      - '.github/workflows/demo-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'demo/**'
      - '.github/workflows/demo-deploy.yml'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Build SDK
        working-directory: sdk
        run: npm ci && npm run build

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci

      - name: Pull Vercel env and build
        working-directory: demo
        run: |
          npx vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

          # Generate vercel.json with rewrites to proxy HTTP backends through
          # the Vercel deployment, avoiding mixed HTTP/HTTPS content errors.
          eval "$(grep '^BACKEND_' ".vercel/.env.${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}.local")"
          printf '{"installCommand":"echo skipped","outputDirectory":"dist","rewrites":[{"source":"/api/rpc/:path*","destination":"%s/rpc/:path*"},{"source":"/api/indexer/:path*","destination":"%s/:path*"},{"source":"/api/prover/:path*","destination":"%s/:path*"}]}\n' \
            "$BACKEND_RPC_URL" "$BACKEND_INDEXER_URL" "$BACKEND_PROVER_URL" > vercel.json

          npx vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        id: deploy-prod
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: demo
          vercel-args: '--prebuilt --prod'
          github-comment: false

      - name: Deploy to Vercel (preview)
        id: deploy-preview
        if: github.ref != 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: demo
          vercel-args: '--prebuilt'
          github-comment: true

      - name: Create GitHub deployment
        if: github.ref == 'refs/heads/main'
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: privacy-starknet-integration
          environment-url: ${{ steps.deploy-prod.outputs.preview-url }}
          ref: ${{ github.sha }}
          initial-status: success
